<!doctype html>
<!-- index.html -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Quantaudio Studio™ — Scripture-Inspired. Cinematic.</title>
  <meta name="description" content="Quantaudio Studio™ creates scripture-inspired cinematic music. Listen live, license music, and explore Bible-based QA prompts." />
  <link rel="canonical" href="https://quantaudio.studio/" />
  <meta name="theme-color" content="#6F615D" />

  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta property="og:title" content="Quantaudio Studio™ — Scripture-Inspired. Cinematic." />
  <meta property="og:description" content="Cinematic worship and devotional instrumentals. Listen live, license music, and explore QA prompts." />
  <meta property="og:url" content="https://quantaudio.studio/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://quantaudio.studio/og-image.jpg" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    :root {
      --taupe: #6F615D;
      --bg: #fff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--taupe);
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main.wrap {
      width: 100%;
      max-width: 1060px;
      padding: 48px 16px;
      text-align: center;
    }

    .visually-hidden {
      position: absolute !important;
      height: 1px;
      width: 1px;
      overflow: hidden;
      clip: rect(1px, 1px, 1px, 1px);
      white-space: nowrap;
      border: 0;
      padding: 0;
      margin: -1px;
    }

    .brand {
      position: relative;
      margin: 0 auto 18px;
    }

    .brand::after {
      content: "™";
      position: absolute;
      right: 6px;
      top: 6px;
      font: 700 14px/1 system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      color: var(--taupe);
      opacity: .92;
      pointer-events: none;
    }

    .brand img {
      display: block;
      width: 100vw;
      max-width: 2000px;
      height: auto;
      margin-left: 50%;
      transform: translateX(-50%);
    }

    .lead {
      font-size: 18px;
      opacity: .9;
      margin: 4px 0 28px;
    }

    .btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 10px 0 0;
    }

    a.btn {
      border: 1.6px solid var(--taupe);
      color: var(--taupe);
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      transition: background .15s, color .15s, border-color .15s;
    }

    a.btn:hover,
    a.btn:focus {
      background: var(--taupe);
      color: #fff !important;
      outline: none;
    }

    a.btn-primary {
      background: var(--taupe);
      color: #fff;
    }

    a.btn-primary:hover,
    a.btn-primary:focus {
      background: #514642;
      border-color: #514642;
      color: #fff !important;
    }

    .site-footer {
      padding: 0 16px 28px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .lead {
        font-size: 16px;
      }
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Quantaudio Studio",
    "url": "https://quantaudio.studio/",
    "logo": "https://quantaudio.studio/quantaudio-logo-wide.svg",
    "email": "hello@quantaudio.studio",
    "sameAs": [
      "https://zeno.fm/player/quantaudiostudio",
      "https://youtube.com/@QuantaudioStudio",
      "https://www.instagram.com/quantaudiostudio",
      "https://www.tiktok.com/@quantaudiostudio",
      "https://www.patreon.com/QuantaudioStudio"
    ]
  }
  </script>
</head>
<body>
  <main class="wrap">
    <figure class="brand" aria-label="Quantaudio Studio logo">
      <img src="/quantaudio-logo-wide.svg" alt="Quantaudio Studio logo with musical motif"
           onerror="this.onerror=null;this.src='/quantaudio-logo-wide.png';">
    </figure>

    <h1 class="visually-hidden">Quantaudio Studio™</h1>
    <p class="lead">Scripture-Inspired. Cinematic.</p>

    <nav class="btns" aria-label="Primary navigation">
      <a class="btn" href="/">Home</a>
      <a class="btn btn-primary" href="/radio/">Listen Live</a>
      <a class="btn" href="/license">License</a>
      <a class="btn" href="/qa">QA</a>
      <a class="btn" href="/links">Links</a>
      <a class="btn" href="/press/">Press</a>
      <a class="btn" href="/about">About</a>
    </nav>

    <br>
    <footer class="site-footer">
      © Quantaudio Studio™. All rights reserved.
    </footer>
 
      

  </main>
</body>
</html>
