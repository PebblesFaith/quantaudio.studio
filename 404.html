<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found | Quantaudio Studio™</title>
<meta name="theme-color" content="#6F615D">
<style>
  :root{--taupe:#6F615D}
  html,body{height:100%}
  body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100%;
       font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,Arial,sans-serif;color:var(--taupe);background:#fff}
  main{text-align:center;max-width:760px;padding:24px}
  
  /* Brand + ™ */
    .brand { position: relative; margin: 0 auto 18px; }
    .brand::after {
      content: "™";
      position: absolute; right: 6px; top: 6px;
      font: 700 14px/1 system-ui, -apple-system, "Segoe UI", Roboto, Inter, Arial, sans-serif;
      color: var(--taupe); opacity: .92; pointer-events: none;
    }
    /* Full-bleed logo */
    .brand img {
      display: block;
      width: 100vw;         /* span the viewport */
      max-width: 2000px;    /* keep ultrawide sane */
      height: auto;
      margin-left: 50%;
      transform: translateX(-50%); /* center the 100vw image */
    }
  
  h1{margin:6px 0 8px;font-size:clamp(28px,3.4vw,40px)}
  p{margin:0 auto 14px;max-width:60ch;line-height:1.6;font-size:18px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;padding:10px 16px;border-radius:999px;text-decoration:none;border:1.6px solid var(--taupe);color:var(--taupe)}
  .btn:hover{background:var(--taupe);color:#fff}
</style>
</head>
<body>
<main>

   <figure class="brand" aria-label="Quantaudio Studio logo">
      <!-- Use the wide asset if uploaded; otherwise swap to /quantaudio-logo.svg -->
      <img src="/quantaudio-logo-wide.svg" alt="Quantaudio Studio logo with musical motif"
           onerror="this.onerror=null;this.src='/quantaudio-logo-wide.png';">
    </figure>

  <h1>404 — Not Found</h1>
  <p>That page isn’t here. Try the homepage, licensing, or our QA prompts.</p>
  <div class="btns">
    <a class="btn" href="/">Home</a>
    <a class="btn" href="/license">License</a>
    <a class="btn" href="/qa">QA</a>
  </div>
</main>
</body>
</html>
